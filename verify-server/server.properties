# Verify server - dedicated MC server for Discord linking only.
# Drop this into your Pterodactyl allocation's server root.
#
# Floodgate handles auth before any connection reaches the server, so
# online-mode=false is correct and safe. Do NOT remove Floodgate or the
# server becomes wide open.

online-mode=false
white-list=false

# Void world: a single bedrock layer at y=0, otherwise air. Combined with
# adventure mode + worldborder this gives players no way to wander or grief.
level-type=minecraft\:flat
generator-settings={"layers":[{"block":"minecraft:bedrock","height":1}],"biome":"minecraft:the_void"}

spawn-protection=64
view-distance=4
simulation-distance=4
max-players=20
motd=Verify Server - Link your Discord here

# Force adventure (blocks can't be broken / placed) + peaceful.
gamemode=adventure
force-gamemode=true
difficulty=peaceful

# Skip the death/respawn screen entirely. (If your loader rejects this key
# in server.properties, the gamerule version is set via /gamerule on first
# boot - see README.)
do-immediate-respawn=true

# Sensible defaults for a no-survival server
allow-flight=true
allow-nether=false
spawn-monsters=false
spawn-animals=false
spawn-npcs=false
generate-structures=false
pvp=false
enable-command-block=false
